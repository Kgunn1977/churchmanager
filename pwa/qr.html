<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PWA QR Code</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:20px;padding:40px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.08);max-width:400px;width:100%}
h1{font-size:20px;color:#111827;margin-bottom:4px}
.url{font-size:13px;color:#6b7280;margin-bottom:24px;word-break:break-all}
#qr{margin:0 auto 24px}
#qr img,#qr canvas,#qr svg{max-width:260px;height:auto}
.instructions{font-size:13px;color:#6b7280;line-height:1.6}
.instructions strong{color:#111827}
.badge{display:inline-block;background:#1e40af;color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:16px}
.print-btn{margin-top:16px;padding:10px 24px;background:#2563eb;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.print-btn:hover{background:#1d4ed8}
@media print{body{background:#fff}.card{box-shadow:none;padding:20px}.print-btn{display:none}}
</style>
</head>
<body>
<div class="card">
    <div class="badge">My Tasks — PWA</div>
    <h1>Scan to Open</h1>
    <p class="url">https://kg-fire.com/churchmanager/pwa/install.php</p>
    <div id="qr"></div>
    <div class="instructions">
        <strong>iPhone:</strong> Open Camera → point at code<br>
        <strong>Android:</strong> Open Camera or Google Lens<br>
        Then tap "Add to Home Screen" to install
    </div>
    <button class="print-btn" onclick="window.print()">Print This Page</button>
</div>
<script>
var qr = qrcode(0, 'M');
qr.addData('https://kg-fire.com/churchmanager/pwa/install.php');
qr.make();
document.getElementById('qr').innerHTML = qr.createSvgTag(8, 0);
</script>
</body>
</html>
